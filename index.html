<!DOCTYPE html>
<html lang="as">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f0f10" />
<meta name="description" content="ন্যায়সেতু — ভাৰতীয় সংবিধান আৰু আইন অসমীয়াত জানক" />
<title>ন্যায়সেতু — NyaySetu</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23c9a24a'/%3E%3Ctext x='32' y='42' font-size='34' text-anchor='middle' fill='%230f0f10' font-family='serif'%3Eন%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/reader.css" />
<link rel="stylesheet" href="css/components.css" />
</head>
<body data-theme="dark" data-reader="day">

<!-- ============ SPLASH ============ -->
<div id="splash" class="splash" aria-hidden="true">
  <div class="splash-mark">
    <svg viewBox="0 0 120 120" class="ashoka" aria-label="Ashoka Emblem">
      <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="60" cy="60" r="6" fill="currentColor"/>
      <g stroke="currentColor" stroke-width="1.5">
        <line x1="60" y1="10" x2="60" y2="110"/>
        <line x1="10" y1="60" x2="110" y2="60"/>
        <line x1="24" y1="24" x2="96" y2="96"/>
        <line x1="96" y1="24" x2="24" y2="96"/>
      </g>
      <g fill="currentColor">
        <circle cx="60" cy="12" r="2.5"/><circle cx="60" cy="108" r="2.5"/>
        <circle cx="12" cy="60" r="2.5"/><circle cx="108" cy="60" r="2.5"/>
        <circle cx="26" cy="26" r="2.5"/><circle cx="94" cy="94" r="2.5"/>
        <circle cx="94" cy="26" r="2.5"/><circle cx="26" cy="94" r="2.5"/>
      </g>
    </svg>
    <h1 class="splash-title">ন্যায়সেতু</h1>
    <p class="splash-sub">NyaySetu · Justice Bridge</p>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="app" hidden>

  <!-- Top Bar -->
  <header class="topbar" id="topbar">
    <button class="icon-btn" id="backBtn" aria-label="Back" hidden>
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1 class="topbar-title" id="topbarTitle">ন্যায়সেতু</h1>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
    </button>
  </header>

  <!-- Main View -->
  <main id="view" class="view" role="main"></main>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" hidden>
    <div class="modal-card">
      <h3 id="modalTitle" class="modal-title"></h3>
      <p id="modalBody" class="modal-body"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" data-close>বন্ধ কৰক</button>
        <button class="btn btn-primary" id="modalOk" hidden>ঠিক আছে</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ SCRIPTS ============ -->
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/speech.js"></script>
<script src="js/bookmark.js"></script>
<script src="js/search.js"></script>
<script src="js/reader.js"></script>
<script src="js/settings.js"></script>

<script src="js/app.js"></script>
</body>
</html>
